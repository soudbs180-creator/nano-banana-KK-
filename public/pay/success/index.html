<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>支付成功</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: radial-gradient(circle at top, #eff6ff, #ffffff 55%);
        color: #0f172a;
      }
      .card {
        width: min(92vw, 520px);
        border: 1px solid #dbeafe;
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 20px 40px rgba(37, 99, 235, 0.08);
        padding: 28px 24px;
        text-align: center;
      }
      .icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 14px;
        border-radius: 999px;
        background: #2563eb;
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 28px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #334155;
        line-height: 1.7;
      }
      .actions {
        margin-top: 20px;
      }
      a {
        display: inline-block;
        padding: 10px 16px;
        border-radius: 10px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon">✓</div>
      <h1>支付已完成</h1>
      <p>订单状态已提交，积分将在回调处理成功后自动到账。</p>
      <p>如 1 分钟后仍未到账，请刷新账户页面或联系管理员。</p>
      <div class="actions">
        <a href="/">返回系统</a>
      </div>
    </main>
  </body>
 </html>
