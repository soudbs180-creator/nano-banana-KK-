[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build]
  command = "npm ci && node node_modules/vite/bin/vite.js build"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888
  autoLaunch = false

# Functions use config.path for routing (Netlify Functions v2)
# No redirects needed
