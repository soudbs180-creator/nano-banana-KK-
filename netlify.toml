[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build]
  command = "npm ci && node node_modules/vite/bin/vite.js build"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888
  autoLaunch = false

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
